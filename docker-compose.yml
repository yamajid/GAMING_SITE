version: '3.8'

services:
  scraper:
    build: .
    container_name: gaming-scraper
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    volumes:
      - /app/node_modules
      - ./docs:/app/docs
      - ./automation:/app/automation
      - ./logs:/app/logs
    ports:
      - "9615:9615"
    healthcheck:
      test: ["CMD", "pm2", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
