<svg width="720" height="200" viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="720" height="200" fill="#f8f9ff" rx="12"/>
  <!-- Step 1 -->
  <circle cx="80" cy="70" r="28" fill="#667eea"/>
  <text x="80" y="76" text-anchor="middle" fill="white" font-size="20" font-weight="bold">1</text>
  <text x="80" y="115" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Go to</text>
  <text x="80" y="132" text-anchor="middle" fill="#667eea" font-size="11">roblox.com/</text>
  <text x="80" y="148" text-anchor="middle" fill="#667eea" font-size="11">promocodes</text>
  <!-- Arrow -->
  <path d="M122 70 L158 70" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <!-- Step 2 -->
  <circle cx="200" cy="70" r="28" fill="#667eea"/>
  <text x="200" y="76" text-anchor="middle" fill="white" font-size="20" font-weight="bold">2</text>
  <text x="200" y="115" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Log in to</text>
  <text x="200" y="132" text-anchor="middle" fill="#555" font-size="11">your Roblox</text>
  <text x="200" y="148" text-anchor="middle" fill="#555" font-size="11">account</text>
  <!-- Arrow -->
  <path d="M242 70 L278 70" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <!-- Step 3 -->
  <circle cx="320" cy="70" r="28" fill="#667eea"/>
  <text x="320" y="76" text-anchor="middle" fill="white" font-size="20" font-weight="bold">3</text>
  <text x="320" y="115" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Enter</text>
  <text x="320" y="132" text-anchor="middle" fill="#555" font-size="11">the promo</text>
  <text x="320" y="148" text-anchor="middle" fill="#555" font-size="11">code</text>
  <!-- Arrow -->
  <path d="M362 70 L398 70" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <!-- Step 4 -->
  <circle cx="440" cy="70" r="28" fill="#667eea"/>
  <text x="440" y="76" text-anchor="middle" fill="white" font-size="20" font-weight="bold">4</text>
  <text x="440" y="115" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Click</text>
  <text x="440" y="132" text-anchor="middle" fill="#555" font-size="11">Redeem</text>
  <text x="440" y="148" text-anchor="middle" fill="#555" font-size="11">button</text>
  <!-- Arrow -->
  <path d="M482 70 L518 70" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <!-- Step 5 -->
  <circle cx="560" cy="70" r="28" fill="#48bb78"/>
  <text x="560" y="76" text-anchor="middle" fill="white" font-size="20" font-weight="bold">✓</text>
  <text x="560" y="115" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Done!</text>
  <text x="560" y="132" text-anchor="middle" fill="#555" font-size="11">Item in your</text>
  <text x="560" y="148" text-anchor="middle" fill="#555" font-size="11">inventory</text>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#667eea" stroke-width="1.5"/>
    </marker>
  </defs>
  <text x="360" y="185" text-anchor="middle" fill="#888" font-size="11">Takes less than 60 seconds — items appear instantly</text>
</svg>
