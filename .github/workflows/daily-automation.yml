# Daily Automation - FREE scheduled scraping & deployment
# Scrapes → Generates → Writes files → Git commit & push → Netlify auto-deploys
#
# No PR/merge: Direct push to main. Netlify deploys automatically on push.
#
# Optional secrets: REDDIT_CLIENT_ID, REDDIT_CLIENT_SECRET, CLAUDE_API_KEY

name: Daily Content Automation

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC
    - cron: '0 14 * * *'  # 2:00 PM UTC
  workflow_dispatch:

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # Required for git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers (for Epic Games scraping)
        run: npx playwright install chromium --with-deps

      - name: Run daily automation (scrape → generate → write files)
        env:
          GITHUB_ACTIONS: 'true'
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: node automation/scheduler.js --once

      - name: Commit and push (triggers Netlify deploy)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: [AUTO] Daily content update - $(date -u +%Y-%m-%d)"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Pushed to ${{ github.ref_name }} - Netlify will auto-deploy"
          else
            echo "ℹ️ No changes to commit"
          fi
