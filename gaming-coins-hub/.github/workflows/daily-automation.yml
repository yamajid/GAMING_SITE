name: 🤖 Daily Gaming Coins Automation

on:
  schedule:
    # Run at 2:00 AM UTC every day
    - cron: '0 2 * * *'
  
  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  automate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🤖 Run daily automation
        run: node automation/scheduler.js --once
        env:
          # Reddit API (required)
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          
          # GitHub (required)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          
          # Claude API (optional - for better content)
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          
          # Vercel (optional - for deployment)
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          
          # Notifications (optional)
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          
          # Configuration
          DEBUG: ${{ secrets.DEBUG || 'false' }}
          DRY_RUN: 'false'

      - name: ✅ Automation completed
        if: success()
        run: echo "Daily automation completed successfully! 🎉"

      - name: ❌ Automation failed
        if: failure()
        run: echo "Daily automation failed. Check logs above."

      - name: 📱 Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Gaming Coins Hub daily automation failed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

# Secrets to configure in GitHub repository settings:
# 
# REQUIRED:
# - REDDIT_CLIENT_ID
# - REDDIT_CLIENT_SECRET
# 
# OPTIONAL (for better functionality):
# - CLAUDE_API_KEY
# - VERCEL_TOKEN
# - VERCEL_PROJECT_ID
# - SLACK_WEBHOOK
# - DISCORD_WEBHOOK
# - DEBUG
#
# Instructions to set up:
# 1. Go to https://github.com/YOUR_REPO/settings/secrets/actions
# 2. Click "New repository secret"
# 3. Add each secret from above
# 4. Save
# 5. Workflow will run automatically at scheduled time
